# HNSW / CAGRA parameters for index_size_analysis.ipynb
#
# CAGRA recall: graph_degree is NOT monotonic with IVF-PQ graph build — if recall drops
# when raising graph_degree, back off (e.g. 40–48) and use search_width / itopk instead.
# Try build_algo: nn_descent as a single A/B vs ivf_pq.

faiss:
  M: 16
  ef_construction: 256
  ef_search: 80

cagra:
  build_algo: nn_descent      # kNN graph builder (ivf_pq | nn_descent)
  graph_degree: 32      # 64 hurt recall here; 32–48 is a safer band for IVF-PQ build
  intermediate_graph_degree: 64
  itopk_size: 60         # search beam; raise if recall still low after search_width
  search_width: 1        # more entry points per search step (recall vs speed); wired to C++ client
  persistent: true       # C++ client high QPS; Python path uses same flag
  ef_construction: 512   # only for legacy CAGRA→HNSW path if present
  ef: 80

ivf_pq:
  n_lists: 1024
  n_probes: 32
